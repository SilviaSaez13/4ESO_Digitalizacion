    <p>Una contraseña es la llave de tu vida digital. Si alguien la consigue, puede entrar en tu correo, tus redes sociales, tu banco o cualquier servicio que uses. Por eso importa hacerla bien desde el principio.</p>

  B2: { titulo:'Cómo configurar tu privacidad en redes sociales', html:`

  B3: { titulo:'Cómo saber si tu móvil u ordenador está en peligro', html:`
    <p>Los programas maliciosos (malware) no siempre son visibles. Muchos están diseñados para pasar desapercibidos mientras roban datos, espían tu actividad o usan tu dispositivo para atacar a otros. Pero suelen dejar señales.</p>

    <p>Los tipos de amenazas más comunes son los <strong>virus y malware</strong> (programas que dañan o toman control del dispositivo), el <strong>ransomware</strong> (cifra tus archivos y pide dinero para recuperarlos) y el <strong>spyware</strong> (espía tu actividad sin que lo sepas).</p>

      <li>Si el problema persiste, haz un restablecimiento de fábrica como último recurso</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/virus-amenazas" target="_blank">⛏ Más info en INCIBE →</a>

  B4: { titulo:'Qué hacer para mantener tu dispositivo protegido', html:`
    <p>Proteger tu dispositivo no requiere ser experto en tecnología. La mayoría de los ataques aprovechan descuidos básicos que se evitan con hábitos sencillos. La seguridad no es un estado, es una práctica continua.</p>
    <div class="ejemplo"><div class="ejemplo-label">El error más común</div>
    <p>Ignorar las actualizaciones del sistema. Cuando el móvil o el ordenador te avisa de una actualización disponible, muchas personas la posponen indefinidamente. Esas actualizaciones corrigen vulnerabilidades de seguridad conocidas que los atacantes explotan activamente.</p></div>
    <p>Las herramientas básicas de protección son: <strong>antivirus</strong> (detecta y elimina malware), <strong>cortafuegos o firewall</strong> (controla qué programas se conectan a internet), <strong>actualizaciones del sistema</strong> (cierran agujeros de seguridad) y <strong>copias de seguridad o backup</strong> (te permiten recuperar todo si algo falla).</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Hábitos básicos de protección</div><ol>
      <li>Instala las actualizaciones del sistema en cuanto estén disponibles</li>
      <li>No descargues apps de fuera de las tiendas oficiales (App Store, Google Play)</li>
      <li>No hagas clic en enlaces de mensajes o correos que no esperabas recibir</li>
      <li>Haz copias de seguridad de tus fotos y documentos importantes (en la nube o en un disco externo)</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/virus-amenazas" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  B5: { titulo:'WiFi pública: cuándo sí y cuándo no', html:`
    <p>Las redes WiFi públicas — de cafeterías, centros comerciales, aeropuertos, bibliotecas — son cómodas pero arriesgadas. Al conectarte a una red pública, otros usuarios en esa misma red podrían interceptar tu tráfico si no van cifrado.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Te conectas al WiFi de un centro comercial para ver algo rápido. Alguien en esa misma red, con un programa sencillo de análisis de tráfico, puede ver qué webs visitas y, si alguna no usa HTTPS correctamente, capturar datos que envías.</p></div>
    <p>El riesgo real no es usar WiFi pública para cualquier cosa, sino usarla para cosas sensibles: entrar en tu banco, comprar online, o acceder a cuentas con información importante. Para ver un vídeo o consultar el tiempo, el riesgo es mínimo.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Reglas para WiFi pública</div><ol>
      <li>Nunca accedas a tu banco ni hagas compras desde una red pública</li>
      <li>Desactiva la conexión automática a redes WiFi conocidas</li>
      <li>Si necesitas privacidad en redes públicas, usa una VPN</li>
      <li>Cuando termines, cierra sesión en las cuentas que hayas abierto</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/virus-amenazas" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  B6: { titulo:'Te ha llegado algo sospechoso o alguien se ha hecho pasar por ti', html:`
    <p>Cuando alguien te manda un mensaje haciéndose pasar por tu banco, por Correos, por la DGT o por cualquier empresa para robarte datos o dinero, eso se llama <strong>phishing</strong>. Si llega por SMS se llama <strong>smishing</strong>, y si es por llamada de teléfono, <strong>vishing</strong>. El nombre cambia, la táctica es la misma: crear urgencia o miedo para que actúes sin pensar.</p>
    <div class="ejemplo"><div class="ejemplo-label">Situaciones reales</div>
    <p>Recibes un SMS de "tu banco" diciendo que tu cuenta ha sido bloqueada y que pulses un enlace para verificarla. El enlace lleva a una web idéntica a la del banco pero falsa. O te llaman diciendo ser de Microsoft y que tu ordenador tiene un virus — te piden acceso remoto para "arreglarlo".</p></div>
    <p>La suplantación de identidad también puede ir al revés: alguien roba tu cuenta de Instagram o WhatsApp y se hace pasar por ti para pedir dinero a tus contactos o difundir contenido en tu nombre.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Cómo reaccionar</div><ol>
      <li><strong>Para</strong> — no hagas clic, no respondas, no llames al número del mensaje</li>
      <li><strong>Verifica</strong> — busca el número o la web oficialmente, no uses los datos del mensaje</li>
      <li><strong>Consulta</strong> — pregunta a alguien de confianza si tienes dudas</li>
      <li>Si han entrado en tu cuenta, cambia la contraseña y activa el doble factor inmediatamente</li>
      <li>Puedes reportarlo al INCIBE en el <strong>017</strong> — es gratuito y confidencial</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/ingenieria-social-fraudes-online/phishing" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  B7: { titulo:'Me han engañado — ¿qué hago ahora?', html:`
    <p>Si has caído en una estafa o fraude online, lo primero es no entrar en pánico. Hay pasos concretos que puedes dar para minimizar el daño. Cuanto antes actúes, mejor.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Has pulsado un enlace sospechoso y has introducido tu contraseña del banco en una web falsa. O has pagado en una tienda online que resultó ser fraudulenta y el producto nunca llegó.</p></div>
    <div class="que-hacer"><div class="que-hacer-label">✔ Pasos a seguir según la situación</div><ol>
      <li><strong>Si diste tus datos bancarios:</strong> llama a tu banco inmediatamente para bloquear la tarjeta o cuenta. El tiempo es crítico.</li>
      <li><strong>Si diste tu contraseña:</strong> cámbiala ahora mismo en ese servicio y en cualquier otro donde uses la misma. Activa el doble factor.</li>
      <li><strong>Si descargaste algo:</strong> pasa un antivirus completo antes de seguir usando el dispositivo.</li>
      <li><strong>Guarda pruebas:</strong> capturas de pantalla, emails, mensajes — te harán falta si denuncias.</li>
      <li><strong>Denuncia:</strong> en la Policía Nacional o Guardia Civil (presencialmente o en sus webs) y en el 017 de INCIBE.</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/ingenieria-social-fraudes-online" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C1: { titulo:'Cómo detectar una noticia falsa antes de compartirla', html:`
    <p>Las noticias falsas (también llamadas <strong>fake news</strong> o <strong>bulos</strong>) son informaciones falsas o manipuladas que se propagan por internet para engañar, desinformar o manipular a las personas. No siempre son completamente inventadas — a veces mezclan datos reales con mentiras para resultar más creíbles.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Te llega un mensaje de WhatsApp que dice que el Gobierno va a cobrar por usar redes sociales a partir del mes que viene. Incluye un logo oficial y suena urgente. Miles de personas lo reenvían antes de comprobarlo. Era completamente falso.</p></div>
    <p>Los bulos usan varias tácticas: titulares exagerados o alarmistas, imágenes sacadas de contexto, páginas web que imitan a medios reales cambiando solo alguna letra en la URL, o mensajes que piden que lo reenvíes a todos tus contactos cuanto antes.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Antes de compartir, comprueba</div><ol>
      <li>Verifica la fuente: ¿es un medio conocido y de confianza? ¿Hay otras fuentes que lo confirmen?</li>
      <li>Lee la noticia completa, no solo el titular — los titulares sensacionalistas suelen no reflejar el contenido real</li>
      <li>Busca la noticia en un verificador: Maldita.es, Newtral o Snopes son de confianza</li>
      <li>Fíjate en la fecha — a veces se reciclan noticias antiguas como si fueran actuales</li>
      <li>Si tienes dudas, no lo compartas — es mejor no difundir que contribuir a un bulo</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C2: { titulo:'Por qué solo te muestran lo que ya piensas (burbujas)', html:`
    <p>Los algoritmos de las redes sociales, YouTube o Google están diseñados para mostrarte contenido que te gusta, que te engancha y que te hace quedarte más tiempo en la plataforma. El problema es que, sin darte cuenta, acabas viendo solo ideas, opiniones y noticias que confirman lo que ya piensas. A esto se le llama <strong>burbuja de filtro</strong> o <strong>cámara de eco</strong>.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Dos personas buscan en YouTube "¿es buena la energía solar?" Según su historial, una recibe vídeos a favor y la otra en contra. Ambas creen que tienen razón porque "todo lo que ven" lo confirma. Pero en realidad, el algoritmo simplemente les está dando lo que ya querían escuchar.</p></div>
    <p>Las burbujas de filtro tienen consecuencias reales: refuerzan ideas extremas, dificultan el debate entre personas con opiniones distintas y hacen que sea más fácil que los bulos se propaguen dentro de grupos que ya comparten esas creencias.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Cómo salir de tu burbuja</div><ol>
      <li>Busca activamente fuentes y opiniones distintas a las que sueles consumir</li>
      <li>Sigue a personas o medios con perspectivas diferentes a las tuyas</li>
      <li>Usa el modo incógnito para buscar sin que el algoritmo filtre los resultados</li>
      <li>Desactiva las recomendaciones personalizadas en YouTube si quieres explorar sin filtros</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C3: { titulo:'Vídeos e imágenes que no son reales (deepfakes e IA)', html:`
    <p>Un <strong>deepfake</strong> es un vídeo, audio o imagen generado o manipulado con inteligencia artificial para que parezca real. La tecnología ha avanzado tanto que cada vez es más difícil distinguirlos a simple vista. Se usan para difundir bulos, dañar la reputación de personas, crear contenido falso de famosos o fabricar pruebas inexistentes.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Circula un vídeo de un político diciendo algo escandaloso que nunca dijo. O aparece una foto de un famoso en un lugar donde nunca estuvo. O alguien usa tu cara en un vídeo sin tu consentimiento. Todo generado por IA en minutos.</p></div>
    <p>Para detectar un deepfake, fíjate en: movimientos de ojos poco naturales (los humanos parpadean cada 2-8 segundos), sombras o iluminación que no coinciden con el entorno, audio que no sincroniza bien con los labios, o bordes borrosos alrededor del pelo o la cara.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Qué hacer</div><ol>
      <li>Desconfía de vídeos con titulares muy alarmantes o que apelan mucho a las emociones</li>
      <li>Busca la fuente original: ¿dónde apareció primero este vídeo o imagen?</li>
      <li>Usa herramientas de detección como Illuminarty para analizar imágenes sospechosas</li>
      <li>Haz búsqueda inversa de imágenes en Google para ver dónde más aparece</li>
      <li>Antes de compartir, verifica siempre — un deepfake compartido masivamente puede destruir reputaciones</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C4: { titulo:'Cómo participar en la red con criterio y respeto', html:`
    <p>Internet es un espacio público. Lo que escribes, compartes o comentas tiene consecuencias reales para personas reales, igual que si lo dijeras en voz alta en la calle. La <strong>etiqueta digital</strong> es el conjunto de normas de comportamiento que hacen que la convivencia online sea posible y respetuosa.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Comentar algo hiriente en una foto creyendo que "total, no me conoce" no lo hace menos dañino. Las palabras en internet duelen igual. Y además quedan. Una captura de pantalla puede volver años después.</p></div>
    <p>Participar en la red con criterio también significa usar tu voz de forma responsable: compartir solo lo que has verificado, no difundir contenido que humille o dañe a otras personas, y saber que tienes derecho a expresarte pero también responsabilidad sobre lo que dices.</p>
    <p>La libertad de expresión online tiene límites legales: el discurso de odio, las amenazas, el acoso y la difamación son delitos también en internet.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Buenas prácticas online</div><ol>
      <li>Trata a las personas online como las tratarías en persona</li>
      <li>No compartas contenido sin verificar, aunque te parezca interesante o gracioso</li>
      <li>Si ves acoso o contenido dañino, usa los mecanismos de denuncia de la plataforma</li>
      <li>Piensa antes de publicar: ¿te importaría que lo viera tu familia, tu profesor/a o tu futuro empleador?</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `}

// ── CONSTRUIR SIDEBAR ──
const sidebar = document.getElementById('sidebar');
const contentArea = document.getElementById('content');

bloques.forEach(b => {
  const bloqueDiv = document.createElement('div');
  bloqueDiv.className = 'bloque';

  const head = document.createElement('div');
  head.className = 'bloque-head';
  head.id = `head-${b.id}`;
  head.innerHTML = `
    <span class="letra ${b.lc}">${b.letra}</span>
    <span class="bloque-icon">${b.icon}</span>
    <div class="bloque-info">
      <div class="bloque-titulo">${b.titulo}</div>
      <div class="bloque-desc">${b.desc}</div>
    </div>
    <span class="bloque-arrow" id="arrow-${b.id}">▶</span>
  `;

  const temasDiv = document.createElement('div');
  temasDiv.className = 'bloque-temas';
  temasDiv.id = `temas-${b.id}`;

  b.grupos.forEach(grupo => {
    const sep = document.createElement('div');
    sep.className = `pag-sep ${b.sc}`;
    sep.innerHTML = `<span class="pag-titulo">${grupo.titulo}</span>`;
    temasDiv.appendChild(sep);

    grupo.temas.forEach(t => {
      const btn = document.createElement('button');
      btn.className = `tema-btn ${b.tc}`;
      btn.id = `btn-${t.cod}`;
      btn.innerHTML = `<span class="tema-cod">${t.cod}</span><span class="tema-nombre-side">${t.nombre}</span>`;
      btn.addEventListener('click', () => mostrarTema(t.cod, b));
      temasDiv.appendChild(btn);
    });
  });

  head.addEventListener('click', () => {
    const yaAbierto = temasDiv.classList.contains('open');
    document.querySelectorAll('.bloque-temas').forEach(t => t.classList.remove('open'));
    document.querySelectorAll('.bloque-arrow').forEach(a => a.classList.remove('open'));
    document.querySelectorAll('.bloque-head').forEach(h => {
      h.classList.remove('active-a','active-b','active-c','active-d');
    });
    if (!yaAbierto) {
      temasDiv.classList.add('open');
      document.getElementById(`arrow-${b.id}`).classList.add('open');
      head.classList.add(b.ac);
    }
  });

  bloqueDiv.appendChild(head);
  bloqueDiv.appendChild(temasDiv);
  sidebar.appendChild(bloqueDiv);
});

// ── MOSTRAR TEMA ──
function mostrarTema(cod, bloque) {
  document.querySelectorAll('.tema-btn').forEach(b => {
    b.classList.remove('active-a','active-b','active-c','active-d');
  });
  document.getElementById(`btn-${cod}`).classList.add(bloque.ac);

  const data = contenidos[cod];
  let nombreTema = '';
  bloques.forEach(bl => bl.grupos.forEach(g => g.temas.forEach(t => {
    if (t.cod === cod) nombreTema = t.nombre;
  })));

  if (data) {
    contentArea.innerHTML = `
      <div class="tema-content ${bloque.cc} active">
        <div class="tema-breadcrumb">
          <span class="breadcrumb-bloque ${bloque.bc}">${bloque.icon} ${bloque.id}</span>
          <span>›</span><span>${bloque.titulo}</span><span>›</span><span>${cod}</span>
        </div>
        <div class="tema-header"><h2>${cod} · ${data.titulo}</h2>
          <div class="tema-url-badge">URL: silviasaez13.github.io/4ESO_Digitalizacion/#${cod}</div>
        </div>
        <div class="tema-body">${data.html}</div>
      </div>`;
  } else {
    contentArea.innerHTML = `
      <div class="tema-content ${bloque.cc} active">
        <div class="tema-breadcrumb">
          <span class="breadcrumb-bloque ${bloque.bc}">${bloque.icon} ${bloque.id}</span>
          <span>›</span><span>${bloque.titulo}</span><span>›</span><span>${cod}</span>
        </div>
        <div class="tema-header"><h2>${cod} · ${nombreTema}</h2>
          <div class="tema-url-badge">URL: silviasaez13.github.io/4ESO_Digitalizacion/#${cod}</div>
        </div>
        <div class="pendiente"><div class="pendiente-icon">⛏</div><p>Contenido en construcción</p></div>
      </div>`;
  }
  history.pushState(null, '', `#${cod}`);
}

// ── HASH ROUTING ──
window.addEventListener('load', () => {
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    bloques.forEach(b => {
      b.grupos.forEach(g => {
        g.temas.forEach(t => {
          if (t.cod === hash) {
            document.getElementById(`temas-${b.id}`).classList.add('open');
            document.getElementById(`arrow-${b.id}`).classList.add('open');
            document.getElementById(`head-${b.id}`).classList.add(b.ac);
            mostrarTema(hash, b);
          }
        });
      });
    });
  }
});
</script>
