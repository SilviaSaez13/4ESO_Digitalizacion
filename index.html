      <li><strong>Si diste tu contraseña:</strong> cámbiala ahora en ese servicio y en cualquier otro donde uses la misma. Activa el doble factor.</li>
      <li><strong>Si descargaste algo:</strong> pasa un antivirus completo antes de seguir usando el dispositivo.</li>
      <li><strong>Guarda pruebas:</strong> capturas de pantalla, emails, mensajes — te harán falta si denuncias.</li>
      <li><strong>Denuncia:</strong> en la Policía Nacional o Guardia Civil y en el 017 de INCIBE.</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/ingenieria-social-fraudes-online" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C1: { titulo:'Cómo detectar una noticia falsa antes de compartirla', html:`
    <p>Las noticias falsas (<strong>fake news</strong> o <strong>bulos</strong>) son informaciones falsas o manipuladas que se propagan para engañar o desinformar. No siempre son completamente inventadas — a veces mezclan datos reales con mentiras para resultar más creíbles.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Te llega un mensaje de WhatsApp que dice que el Gobierno va a cobrar por usar redes sociales. Incluye un logo oficial y suena urgente. Miles de personas lo reenvían antes de comprobarlo. Era completamente falso.</p></div>
    <p>Los bulos usan titulares exagerados, imágenes sacadas de contexto, páginas que imitan medios reales o mensajes que piden que lo reenvíes cuanto antes.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Antes de compartir, comprueba</div><ol>
      <li>Verifica la fuente: ¿es un medio conocido? ¿Lo confirman otras fuentes?</li>
      <li>Lee la noticia completa, no solo el titular — los titulares sensacionalistas suelen no reflejar el contenido</li>
      <li>Busca la noticia en un verificador: Maldita.es, Newtral o Snopes</li>
      <li>Fíjate en la fecha — a veces se reciclan noticias antiguas como si fueran actuales</li>
      <li>Si tienes dudas, no lo compartas</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C2: { titulo:'Por qué solo te muestran lo que ya piensas (burbujas)', html:`
    <p>Los algoritmos de las redes sociales y YouTube están diseñados para mostrarte contenido que te gusta y te engancha. Sin darte cuenta, acabas viendo solo ideas y noticias que confirman lo que ya piensas. A esto se le llama <strong>burbuja de filtro</strong> o <strong>cámara de eco</strong>.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Dos personas buscan en YouTube "¿es buena la energía solar?" Según su historial, una recibe vídeos a favor y la otra en contra. Ambas creen que tienen razón porque "todo lo que ven" lo confirma. Pero el algoritmo simplemente les da lo que ya querían escuchar.</p></div>
    <p>Las burbujas refuerzan ideas extremas, dificultan el debate y hacen que los bulos se propaguen más fácilmente dentro de grupos que ya comparten esas creencias.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Cómo salir de tu burbuja</div><ol>
      <li>Busca activamente fuentes y opiniones distintas a las que sueles consumir</li>
      <li>Sigue a personas o medios con perspectivas diferentes</li>
      <li>Usa el modo incógnito para buscar sin que el algoritmo filtre los resultados</li>
      <li>Desactiva las recomendaciones personalizadas en YouTube si quieres explorar sin filtros</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C3: { titulo:'Vídeos e imágenes que no son reales (deepfakes e IA)', html:`
    <p>Un <strong>deepfake</strong> es un vídeo, audio o imagen generado con inteligencia artificial para que parezca real. Se usan para difundir bulos, dañar reputaciones o fabricar pruebas inexistentes.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Circula un vídeo de un político diciendo algo escandaloso que nunca dijo. O aparece una foto de un famoso en un lugar donde nunca estuvo. O alguien usa tu cara en un vídeo sin tu consentimiento. Todo generado por IA en minutos.</p></div>
    <p>Para detectar un deepfake: movimientos de ojos poco naturales, sombras que no coinciden, audio que no sincroniza con los labios, o bordes borrosos alrededor del pelo y la cara.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Qué hacer</div><ol>
      <li>Desconfía de vídeos con titulares muy alarmantes o que apelan mucho a las emociones</li>
      <li>Busca la fuente original: ¿dónde apareció primero este vídeo o imagen?</li>
      <li>Usa herramientas de detección como Illuminarty para analizar imágenes sospechosas</li>
      <li>Haz búsqueda inversa de imágenes en Google para ver dónde más aparece</li>
      <li>Antes de compartir, verifica siempre</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  C4: { titulo:'Cómo participar en la red con criterio y respeto', html:`
    <p>Internet es un espacio público. Lo que escribes, compartes o comentas tiene consecuencias reales para personas reales. La <strong>etiqueta digital</strong> es el conjunto de normas que hacen que la convivencia online sea posible y respetuosa.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Comentar algo hiriente en una foto creyendo que "total, no me conoce" no lo hace menos dañino. Las palabras en internet duelen igual. Y además quedan: una captura de pantalla puede volver años después.</p></div>
    <p>La libertad de expresión online tiene límites legales: el discurso de odio, las amenazas, el acoso y la difamación son delitos también en internet.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Buenas prácticas online</div><ol>
      <li>Trata a las personas online como las tratarías en persona</li>
      <li>No compartas contenido sin verificar, aunque te parezca interesante</li>
      <li>Si ves acoso o contenido dañino, usa los mecanismos de denuncia de la plataforma</li>
      <li>Piensa antes de publicar: ¿te importaría que lo viera tu familia o tu futuro empleador?</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/ciudadania/tematicas/bulos-fake-news" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  D1: { titulo:'El tiempo de pantalla: tu cabeza, tu cuerpo y el planeta', html:`
    <p>Los dispositivos digitales están diseñados para engancharte. Las notificaciones, los likes, el scroll infinito — todo está pensado para que pases el máximo tiempo posible conectado. Eso tiene consecuencias reales en tu salud física, mental y en el medioambiente.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Abres TikTok "un momento" antes de dormir. Cuarenta minutos después sigues ahí. Al día siguiente te cuesta concentrarte en clase y estás más irritable. No es casualidad: la luz azul de la pantalla altera el sueño, y el scroll constante sobreestimula el cerebro.</p></div>
    <p>En cuanto al medioambiente: fabricar un smartphone emite entre 50 y 80 kg de CO₂. Cambiar el móvil cada dos años por uno nuevo tiene un impacto ambiental enorme. Usar los dispositivos el máximo tiempo posible antes de cambiarlos es una de las cosas más sostenibles que puedes hacer.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Hábitos saludables</div><ol>
      <li>Pon el móvil fuera de la habitación al dormir — o activa el modo no molestar desde las 22h</li>
      <li>Haz pausas activas: cada hora de pantalla, 10 minutos sin dispositivos</li>
      <li>Desactiva las notificaciones de redes sociales — tú decides cuándo las miras, no ellas</li>
      <li>Cuando cambies de dispositivo, recíclalo en un punto limpio — nunca a la basura normal</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/menores/tematicas/uso-excesivo" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  D2: { titulo:'Ciberacoso y relaciones online: reconocerlo, pararlo y tratarnos mejor', html:`
    <p>El <strong>ciberacoso</strong> (o ciberbullying) es el acoso que se produce entre menores usando medios digitales para hacer daño a la víctima de forma intencionada y repetida. No se trata de una pelea puntual — es un patrón sostenido de humillaciones, insultos, difusión de rumores o presión para aislar a alguien.</p>
    <div class="ejemplo"><div class="ejemplo-label">Ejemplo real</div>
    <p>Un grupo de clase crea un chat de WhatsApp para burlarse de una compañera. Le mandan mensajes hirientes, comparten fotos suyas con comentarios crueles y presionan a otros para que no hablen con ella. Esto es ciberacoso, y tiene las mismas consecuencias psicológicas que el acoso físico — a veces peores, porque no para al salir del colegio.</p></div>
    <p>Si eres testigo de ciberacoso, tienes responsabilidad: no reírte, no mirar a otro lado y apoyar a la víctima o informar a un adulto marca la diferencia. El silencio de los testigos es lo que permite que el acoso continúe.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Qué hacer</div><ol>
      <li>Si lo sufres: no respondas, guarda pruebas (capturas) y cuéntaselo a un adulto de confianza</li>
      <li>Bloquea y reporta al acosador en la plataforma donde ocurre</li>
      <li>Si lo ves: no participes ni compartas, apoya a la víctima y avisa a un adulto</li>
      <li>En situaciones graves, se puede denunciar ante la Policía — el anonimato en internet no es real</li>
      <li>Línea de ayuda: <strong>017</strong> de INCIBE, gratuita y confidencial</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/menores/tematicas/ciberacoso" target="_blank">⛏ Más info en INCIBE →</a>
  `},

  D3: { titulo:'Riesgos en relaciones online: grooming y sexting', html:`
    <p>Estas dos situaciones son distintas pero están relacionadas, y ambas pueden tener consecuencias muy graves para los menores.</p>
    <p>El <strong>grooming</strong> ocurre cuando un adulto se hace pasar por un menor en internet para ganarse la confianza de un chico o chica, con el objetivo final de obtener imágenes sexuales o quedar en persona. El proceso es gradual: primero amistad, luego confianza, luego control y chantaje.</p>
    <div class="ejemplo"><div class="ejemplo-label">Señales de alerta del grooming</div>
    <p>Alguien que conociste online insiste en que la conversación sea secreta, quiere que os comuniquéis solo por una app concreta, te pide fotos íntimas "como prueba de confianza" o propone quedar en persona. Todo esto son señales de alerta.</p></div>
    <p>El <strong>sexting</strong> es el envío de imágenes o vídeos íntimos propios a través del móvil. El problema no es la imagen en sí — es que una vez enviada, pierdes el control sobre ella. Puede ser compartida sin tu consentimiento, usada para extorsionarte (sextorsión) o difundida masivamente.</p>
    <div class="que-hacer"><div class="que-hacer-label">✔ Qué hacer</div><ol>
      <li>Nunca compartas imágenes íntimas — una vez enviadas, no puedes recuperarlas</li>
      <li>Si alguien te presiona para que lo hagas, es una señal de alarma. Cuéntaselo a un adulto.</li>
      <li>Si ya ocurrió y estás siendo extorsionado/a: no pagues, no cedas, cuéntaselo a tus padres o tutores y llama al 017</li>
      <li>No quedes en persona con alguien que solo conoces online sin contárselo a un adulto</li>
      <li>Si recibes material íntimo de otra persona sin pedirlo, no lo compartas — es un delito</li>
    </ol></div>
    <a class="incibe-link" href="https://www.incibe.es/menores/tematicas/grooming" target="_blank">⛏ Más info en INCIBE →</a>
  `},

const sidebar = document.getElementById('sidebar');

bloques.forEach(b => {
  const bloqueDiv = document.createElement('div');
  bloqueDiv.className = 'bloque';

  const isRecursos = b.id === 'R';

  const head = document.createElement('div');
  head.className = 'bloque-head';
  head.id = `head-${b.id}`;

  if (isRecursos) {
    head.style.cssText = 'background:#f0ede8; border-top:2px solid #c8c0b0;';
    head.innerHTML = `
      <span style="font-size:20px; flex-shrink:0;">📚</span>
      <div class="bloque-info">
        <div class="bloque-titulo" style="font-size:13px;">Recursos INCIBE</div>
        <div class="bloque-desc">Enlaces oficiales por tema</div>
      </div>
      <span class="bloque-arrow" id="arrow-${b.id}">▶</span>
    `;
  } else {
    head.innerHTML = `
      <span class="letra ${b.lc}">${b.letra}</span>
      <span class="bloque-icon">${b.icon}</span>
      <div class="bloque-info">
        <div class="bloque-titulo">${b.titulo}</div>
        <div class="bloque-desc">${b.desc}</div>
      </div>
      <span class="bloque-arrow" id="arrow-${b.id}">▶</span>
    `;
  }

  const temasDiv = document.createElement('div');
  temasDiv.className = 'bloque-temas';
  temasDiv.id = `temas-${b.id}`;

  b.grupos.forEach(grupo => {
    const sep = document.createElement('div');
    sep.className = `pag-sep ${b.sc || ''}`;
    if (isRecursos) sep.style.cssText = 'background:#f5f0ea;';
    sep.innerHTML = `<span class="pag-titulo" style="${isRecursos ? 'color:#5a4a38;' : ''}">${grupo.titulo}</span>`;
    temasDiv.appendChild(sep);

    grupo.temas.forEach(t => {
      const btn = document.createElement('button');
      btn.className = `tema-btn ${b.tc || ''}`;
      btn.id = `btn-${t.cod}`;
      if (isRecursos) btn.style.cssText = 'background:#faf8f4;';
      btn.innerHTML = `<span class="tema-cod" style="${isRecursos ? 'color:#8a7a68;' : ''}">${t.cod}</span><span class="tema-nombre-side">${t.nombre}</span>`;
      btn.addEventListener('click', () => mostrarTema(t.cod, b));
      temasDiv.appendChild(btn);
    });
  });

  head.addEventListener('click', () => {
    const yaAbierto = temasDiv.classList.contains('open');
    document.querySelectorAll('.bloque-temas').forEach(t => t.classList.remove('open'));
    document.querySelectorAll('.bloque-arrow').forEach(a => a.classList.remove('open'));
    document.querySelectorAll('.bloque-head').forEach(h => {
      h.classList.remove('active-a','active-b','active-c','active-d');
    });
    if (!yaAbierto) {
      temasDiv.classList.add('open');
      document.getElementById(`arrow-${b.id}`).classList.add('open');
      if (!isRecursos) head.classList.add(b.ac);
      else head.style.background = '#e8e0d8';
    } else {
      if (isRecursos) head.style.background = '#f0ede8';
    }
  });

  bloqueDiv.appendChild(head);
  bloqueDiv.appendChild(temasDiv);
  sidebar.appendChild(bloqueDiv);
});

// ── MOSTRAR TEMA ──
function mostrarTema(cod, bloque) {
  document.querySelectorAll('.tema-btn').forEach(b => {
    b.classList.remove('active-a','active-b','active-c','active-d');
    b.style.background = '';
  });
  const btn = document.getElementById(`btn-${cod}`);
  if (bloque.id === 'R') {
    btn.style.background = '#e8e0d8';
  } else {
    btn.classList.add(bloque.ac);
  }

  const data = contenidos[cod];
  let nombreTema = '';
  bloques.forEach(bl => bl.grupos.forEach(g => g.temas.forEach(t => {
    if (t.cod === cod) nombreTema = t.nombre;
  })));

  const isRecursos = bloque.id === 'R';
  const headerColor = isRecursos ? '#5a4a38' : '';
  const ccClass = isRecursos ? 'content-r' : bloque.cc;

  const breadcrumbStyle = isRecursos
    ? `<span style="padding:2px 10px; border-radius:4px; font-weight:600; font-size:11px; background:#8a7a68; color:#fff; border-bottom:2px solid rgba(0,0,0,0.2);">📚 Recursos</span>`
    : `<span class="breadcrumb-bloque ${bloque.bc}">${bloque.icon} ${bloque.id}</span>`;

  if (data) {
    const esRecursoGrid = isRecursos;
    contentArea.innerHTML = `
      <div class="tema-content ${ccClass} active">
        <div class="tema-breadcrumb">
          ${breadcrumbStyle}
          <span>›</span><span>${bloque.titulo}</span><span>›</span><span>${cod}</span>
        </div>
        <div class="tema-header">
          <h2 style="${headerColor ? 'color:'+headerColor : ''}">${esRecursoGrid ? '' : cod+' · '}${data.titulo}</h2>
          ${!isRecursos ? `<div class="tema-url-badge">URL: silviasaez13.github.io/4ESO_Digitalizacion/#${cod}</div>` : ''}
        </div>
        <div class="tema-body">${data.html}</div>
      </div>`;
  } else {
    contentArea.innerHTML = `
      <div class="tema-content ${ccClass} active">
        <div class="tema-breadcrumb">
          ${breadcrumbStyle}
          <span>›</span><span>${bloque.titulo}</span><span>›</span><span>${cod}</span>
        </div>
        <div class="tema-header">
          <h2 style="${headerColor ? 'color:'+headerColor : ''}">${cod} · ${nombreTema}</h2>
        </div>
        <div class="pendiente"><div class="pendiente-icon">⛏</div><p>Contenido en construcción</p></div>
      </div>`;
  }
  history.pushState(null, '', `#${cod}`);
}

// ── HASH ROUTING ──
window.addEventListener('load', () => {
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    bloques.forEach(b => {
      b.grupos.forEach(g => {
        g.temas.forEach(t => {
          if (t.cod === hash) {
            document.getElementById(`temas-${b.id}`).classList.add('open');
            document.getElementById(`arrow-${b.id}`).classList.add('open');
            if (b.id !== 'R') document.getElementById(`head-${b.id}`).classList.add(b.ac);
            mostrarTema(hash, b);
          }
        });
      });
    });
  }
});
</script>
